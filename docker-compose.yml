version: '3.8'

services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080" # Traefik dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - tsapp-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: tsapp_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: tsmanager_db
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - tsapp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
      start_period: 20s

  tsapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tsapp
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # The appsettings.json has the connection string and SMTP details already updated properly.
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tsapp.rule=Host(`dayan2.devtscape.org`)"
      - "traefik.http.routers.tsapp.entrypoints=web"
      - "traefik.http.services.tsapp.loadbalancer.server.port=8080"
    networks:
      - tsapp-network
    restart: unless-stopped

networks:
  tsapp-network:
    name: tsapp-network
    driver: bridge

volumes:
  db_data:
